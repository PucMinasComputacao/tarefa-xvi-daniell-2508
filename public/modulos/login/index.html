<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVerse - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../../index.html">🎬 CineVerse</a>
    </div>
  </nav>

  <div class="container mt-5" style="max-width: 400px;">
    <h2 class="mb-4 titulo-secao">Entrar</h2>

    <div id="erro-login" class="alert alert-danger d-none"></div>

    <form id="form-login">
      <div class="mb-3">
        <label for="login" class="form-label">Login</label>
        <input type="text" class="form-control" id="login" required>
      </div>
      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <input type="password" class="form-control" id="senha" required>
      </div>
      <button type="submit" class="btn btn-danger w-100">Entrar</button>
    </form>

    <p class="text-muted small mt-3">
      Usuários de teste: <strong>admin / 123</strong> ou <strong>user / 123</strong>
    </p>
  </div>

  <script src="../../assets/js/auth.js"></script>
  <script>
    const form = document.getElementById("form-login");
    const erroDiv = document.getElementById("erro-login");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      erroDiv.classList.add("d-none");

      const login = document.getElementById("login").value.trim();
      const senha = document.getElementById("senha").value.trim();

      const resultado = await loginUser(login, senha);

      if (!resultado.sucesso) {
        erroDiv.textContent = resultado.mensagem;
        erroDiv.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
