<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVerse - Cadastrar Filme</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🎬 CineVerse</a>
      <a href="index.html" class="btn btn-outline-light btn-sm">← Voltar</a>
    </div>
  </nav>

  <div class="container mt-5" style="max-width: 700px;">
    <h2 class="mb-4 titulo-secao">🎬 Cadastrar Novo Filme</h2>

    <div id="alert-container"></div>

    <form id="formFilme">
      <div class="mb-3">
        <label class="form-label">Título *</label>
        <input type="text" id="titulo" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Descrição Curta *</label>
        <input type="text" id="descricaoCurta" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Descrição Completa *</label>
        <textarea id="descricaoCompleta" class="form-control" rows="4" required></textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Categoria *</label>
          <select id="categoria" class="form-select" required>
            <option value="">Selecione...</option>
            <option>Ação</option>
            <option>Drama</option>
            <option>Ficção Científica</option>
            <option>Suspense</option>
            <option>Comédia</option>
            <option>Terror</option>
          </select>
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Ano *</label>
          <input type="number" id="ano" class="form-control" required>
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">Nota (0-10)</label>
          <input type="number" id="nota" class="form-control" min="0" max="10" step="0.1">
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Diretor</label>
          <input type="text" id="diretor" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Duração (ex: 2h15min)</label>
          <input type="text" id="duracao" class="form-control">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">URL da Imagem</label>
        <input type="text" id="imagem" class="form-control" placeholder="https://...">
      </div>
      <div class="mb-3">
        <label class="form-label">Tags (separadas por vírgula)</label>
        <input type="text" id="tags" class="form-control" placeholder="ação, aventura, drama">
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" id="destaque" class="form-check-input">
        <label class="form-check-label" for="destaque">Marcar como destaque</label>
      </div>
      <button type="submit" class="btn btn-danger w-100">Cadastrar Filme</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("formFilme").addEventListener("submit", async (e) => {
      e.preventDefault();

      const novoFilme = {
        titulo: document.getElementById("titulo").value,
        descricaoCurta: document.getElementById("descricaoCurta").value,
        descricaoCompleta: document.getElementById("descricaoCompleta").value,
        categoria: document.getElementById("categoria").value,
        ano: parseInt(document.getElementById("ano").value),
        nota: parseFloat(document.getElementById("nota").value) || 0,
        diretor: document.getElementById("diretor").value,
        duracao: document.getElementById("duracao").value,
        imagem: document.getElementById("imagem").value || "https://via.placeholder.com/500x750?text=Sem+Imagem",
        tags: document.getElementById("tags").value.split(",").map(t => t.trim()).filter(t => t),
        destaque: document.getElementById("destaque").checked
      };

      try {
        const response = await fetch("http://localhost:3000/filmes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(novoFilme)
        });

        if (response.ok) {
          document.getElementById("alert-container").innerHTML = `
            <div class="alert alert-success">Filme cadastrado com sucesso! <a href="index.html">Ver catálogo</a></div>
          `;
          document.getElementById("formFilme").reset();
        }
      } catch (error) {
        document.getElementById("alert-container").innerHTML = `
          <div class="alert alert-danger">Erro ao cadastrar. Verifique se o JSON Server está rodando.</div>
        `;
      }
    });
  </script>
</body>
</html>
